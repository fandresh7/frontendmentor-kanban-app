<h1 class="text-3xl font-bold text-gray-900 dark:text-gray-100 mb-6">03 Interactive Elements</h1>
<div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 items-center gap-8">
  <!-- Button Primary (L) Idle with Hover -->
  <div class="flex flex-col items-center">
    <button class="bg-theme-primary text-theme-white py-3 px-8 rounded-full font-medium w-64 transition hover:bg-theme-secondary">Button Primary (L)</button>
    <p class="text-xs text-theme-gray-light mt-2">Idle</p>
  </div>
  <!-- Button Primary (S) Idle with Hover -->
  <div class="flex flex-col items-center">
    <button class="bg-theme-primary leading-6 text-theme-white py-2 px-8 rounded-full text-sm font-medium w-64 transition hover:bg-theme-secondary">Button Primary (S)</button>
    <p class="text-xs text-theme-gray-light mt-2">Idle</p>
  </div>
  <!-- Button Secondary Idle with Corrected Hover -->
  <div class="flex flex-col items-center">
    <button
      class="bg-theme-primary/10 leading-6 text-theme-primary py-2 px-8 rounded-full text-sm font-medium w-64 transition hover:bg-theme-primary/25 hover:text-theme-primary dark:bg-theme-white dark:hover:bg-theme-white">
      Button Secondary
    </button>
    <p class="text-xs text-theme-gray-light mt-2">Idle</p>
  </div>
  <!-- Button Destructive Idle with Hover -->
  <div class="flex flex-col items-center">
    <button class="bg-theme-red-dark leading-6 text-theme-white py-2 px-8 rounded-full text-sm font-medium w-64 transition hover:bg-theme-red-light">Button Destructive</button>
    <p class="text-xs text-theme-gray-light mt-2">Idle</p>
  </div>
</div>
