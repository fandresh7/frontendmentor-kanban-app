<main-header></main-header>

<sidebar
  class="absolute md:static top-0 overflow-hidden transition-[width] duration-500 ease-in-out"
  [ngClass]="{
    'hidden md:block md:w-0': !sidebar(),
    'block md:w-72': sidebar()
  }">
</sidebar>

<main class="h-full overflow-y-auto">
  <button
    class="m-4"
    (click)="sidebarService.toggleSidebar()">
    x
  </button>
  <router-outlet></router-outlet>
</main>
