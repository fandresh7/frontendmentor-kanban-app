<header class="flex items-stretch bg-theme-white max-h-24">
  <div
    class="flex gap-4 items-center p-6 pr-0 md:pr-6 md:border-r border-theme-light-blue"
    [ngClass]="{ 'md:w-72': sidebar(), 'w-auto md:border-b': !sidebar() }">
    <svg
      class="w-8 h-8"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 150 150"
      width="100%"
      height="100%">
      <rect
        x="10%"
        y="10%"
        rx="10%"
        ry="10%"
        width="20%"
        height="80%"
        fill="#4a3ebf" />
      <rect
        x="40%"
        y="10%"
        rx="10%"
        ry="10%"
        width="20%"
        height="80%"
        fill="#716dc2" />
      <rect
        x="70%"
        y="10%"
        rx="10%"
        ry="10%"
        width="20%"
        height="80%"
        fill="#968cce" />
    </svg>
    <p class="text-3xl font-extrabold hidden md:block">Kanban</p>
  </div>
  <div class="flex items-center grow p-6 md:border-b border-theme-light-blue">Platform Lauch</div>
</header>
