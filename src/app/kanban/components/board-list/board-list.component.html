@for (board of boards(); track board.id) {
  <div
    class="relative flex items-center gap-3 p-3 rounded-r-full text-theme-white cursor-pointer"
    [ngClass]="{
      'board-active bg-theme-primary text-theme-white': board.id === activeBoard()?.id,
      'board-hover text-theme-gray-light hover:text-theme-primary hover:bg-theme-primary/10 dark:hover:bg-theme-white': board.id !== activeBoard()?.id
    }">
    <board-icon></board-icon>
    <p class="font-bold">{{ board.name }}</p>
  </div>
}

<div
  class="board-hover relative flex items-center gap-3 text-theme-primary p-3 rounded-r-full cursor-pointer hover:bg-theme-primary/10 dark:hover:bg-theme-white"
  (click)="openAddEditModal()">
  <board-icon></board-icon>
  <div class="flex gap-0.5 items-center">
    <plus-icon></plus-icon>
    <p class="font-bold">Create New Board</p>
  </div>
</div>
