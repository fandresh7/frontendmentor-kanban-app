@let board = activeBoard();
@let columns = board?.columns ?? [];

@if (board && columns.length > 0) {
  <section class="w-full grid items-stretch justify-stretch grid-flow-col auto-cols-[280px] gap-4 overflow-x-auto">
    @for (column of columns; track column.id) {
      <column [column]="column"></column>
    }

    <add-new-column></add-new-column>
  </section>
} @else {
  <section class="w-full h-full grid place-items-center text-center">
    <empty-board></empty-board>
  </section>
}
