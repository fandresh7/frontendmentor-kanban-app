<article
  class="group bg-theme-white dark:bg-theme-charcoal rounded-lg px-4 py-6 flex flex-col gap-2 shadow-md cursor-pointer"
  (click)="openTaskModal()">
  <h3 class="font-bold text-base transition-colors duration-300 group-hover:text-theme-primary">{{ task().title }}</h3>
  <p class="font-bold text-sm text-theme-gray-light">{{ completedSubtasks().length }} of {{ task().subtasks.length }} substasks</p>
</article>
